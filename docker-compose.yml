services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: cairn
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
      - postgres
      - redis
    env_file:
      - .env
    # Lets the container reach a service (e.g. Ollama) running on the Docker
    # host via the hostname host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

volumes:
  mongo-data:
  postgres-data:
  redis-data:
